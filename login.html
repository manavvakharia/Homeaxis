<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login | HomeAxis</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c6a75e;
  --gold-soft:#e5d2a4;
  --dark:#111111;
  --card:#161616;
  --text-main:#ffffff;
  --text-muted:rgba(255,255,255,.65);
  --border-soft:rgba(198,167,94,.18);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  font-family:Montserrat,sans-serif;
  color:var(--text-main);

  background:
    linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.85)),
    url("images/admin-bg.jpeg") center / cover no-repeat fixed;
}

/* ===== CARD ===== */
.login-card{
  background:#161616;
  padding:2.6rem 2.4rem;
  width:min(420px,92%);
  border-radius:18px;
  border:1px solid var(--border-soft);
  box-shadow:0 50px 100px rgba(0,0,0,.8);
  transition:all .4s ease;
}

.login-card:hover{
  border-color:var(--gold);
  box-shadow:0 70px 120px rgba(0,0,0,.9);
}

/* ===== IMAGE ===== */
.admin-image{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:14px;
  margin-bottom:1.6rem;
  box-shadow:0 25px 60px rgba(0,0,0,.6);
}

/* ===== HEADINGS ===== */
.login-card h1{
  margin:0;
  font-size:1.8rem;
  font-weight:900;
  text-align:center;
  letter-spacing:.22em;
  text-transform:uppercase;
}

.login-card p{
  text-align:center;
  color:var(--gold-soft);
  font-size:.75rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  margin:.6rem 0 1.8rem;
}

/* ===== FORM ===== */
form{
  display:grid;
  gap:1.2rem;
}

label{
  font-size:.7rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--gold-soft);
}

input{
  padding:.9rem 1rem;
  border-radius:12px;
  border:1px solid var(--border-soft);
  background:#111111;
  color:#ffffff;
  font-size:.9rem;
  transition:all .25s ease;
}

input::placeholder{
  color:rgba(255,255,255,.35);
}

input:focus{
  outline:none;
  border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(198,167,94,.15);
}

/* ===== BUTTON ===== */
button{
  margin-top:.8rem;
  padding:.9rem;
  border:none;
  border-radius:999px;
  background:linear-gradient(
    135deg,
    var(--gold),
    var(--gold-soft)
  );
  color:#000;
  font-weight:800;
  font-size:.75rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .3s ease;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px rgba(198,167,94,.45);
}

/* ===== ERROR ===== */
.error{
  display:none;
  background:rgba(255,80,80,.12);
  border:1px solid rgba(255,80,80,.35);
  color:#ffbcbc;
  padding:.7rem .9rem;
  border-radius:10px;
  font-size:.8rem;
  margin-bottom:.8rem;
  text-align:center;
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;
  margin-top:1.6rem;
  font-size:.7rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--text-muted);
}
</style>
</head>

<body>
<div class="login-card">
  <img src="images/admin.png"
     alt="HomeAxis Admin"
     class="admin-image">
  <h1>Admin Login</h1>
  <p>HomeAxis</p>

  <div class="error" id="errorBox">Invalid email or password</div>

  <form id="loginForm">
    <div>
      <label>Email</label>
      <input type="email" name="email" required>
    </div>

    <div>
      <label>Password</label>
      <input type="password" name="password" required>
    </div>

    <button type="submit">Login</button>
  </form>

  <div class="footer">
    Authorized access only
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const errorBox = document.getElementById('errorBox');

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  errorBox.style.display = 'none';

  const formData = new FormData(form);

  const res = await fetch(
    "https://script.google.com/macros/s/AKfycbwaownpcNxciBAmOJriE6Kasi8gKYEaYsW2OcO0XK2kXiSowTVUdXCmpY6we3ZN9teh/exec",
    { method:'POST', body:formData }
  );

  const text = await res.text();

  if(text === 'OK'){
    localStorage.setItem('adminLoggedIn','true');
    window.location.href = 'admin.html';
  } else {
    errorBox.style.display = 'block';
  }
});
</script>

</body>
</html>
