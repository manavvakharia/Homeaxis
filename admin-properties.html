<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Properties | HomeAxis</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

<script>
if(localStorage.getItem('adminLoggedIn') !== 'true'){
  location.href='login.html';
}
</script>

<style>
:root{
  --bg:#f8f6f1;
  --champagne:#f3efe6;
  --gold:#c6a75e;
  --gold-soft:#e5d2a4;
  --dark:#111111;
  --card:#ffffff;
  --text-main:#1c1c1c;
  --text-muted:#6b6b6b;
  --border-soft:rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Montserrat,sans-serif;
  background:var(--bg);
  color:var(--text-main);
}

/* ===== HEADER (Dark Executive Bar) ===== */
header{
  background:#111111;
  padding:1.2rem 1.8rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}

header h1{
  font-size:.85rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  margin:0;
  color:var(--gold-soft);
}

/* ===== BACK BUTTON ===== */
.back-btn{
  padding:.65rem 1.6rem;
  border-radius:999px;
  border:1px solid rgba(198,167,94,.4);
  background:transparent;
  color:var(--gold-soft);
  font-size:.7rem;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .3s ease;
}

.back-btn:hover{
  background:linear-gradient(135deg,var(--gold),var(--gold-soft));
  color:#000;
  box-shadow:0 10px 28px rgba(198,167,94,.45);
  transform:translateY(-2px);
}

/* ===== CONTENT ===== */
.container{
  max-width:1180px;
  margin:3rem auto 4rem;
  padding:0 1.5rem;
}

.container h2{
  font-size:1.2rem;
  font-weight:800;
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-bottom:2rem;
}

/* ===== GRID ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:2rem;
}

/* ===== PROPERTY CARD (WHITE LUXURY) ===== */
.card{
  background:var(--card);
  border-radius:18px;
  border:1px solid var(--border-soft);
  padding:1.8rem;
  box-shadow:0 25px 60px rgba(0,0,0,.12);
  transition:all .35s ease;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 40px 80px rgba(0,0,0,.18);
  border-color:var(--gold-soft);
}

.card h3{
  margin:.3rem 0 .8rem;
  font-size:1rem;
  letter-spacing:.04em;
}

.card p{
  margin:.4rem 0;
  font-size:.85rem;
  color:var(--text-muted);
}

/* Price highlight */
.card p[style]{
  color:var(--gold);
  font-weight:700;
}

/* Property Type Tag */
.tag{
  display:inline-block;
  margin-top:1rem;
  padding:.35rem .8rem;
  border-radius:6px;
  background:rgba(198,167,94,.12);
  color:var(--gold);
  font-size:.65rem;
  letter-spacing:.14em;
  text-transform:uppercase;
}

.actions{
  display:flex;
  gap:.5rem;
  margin-top:1rem;
}

.btn{
  border:none;
  border-radius:999px;
  padding:.5rem .9rem;
  font-size:.65rem;
  font-weight:700;
  cursor:pointer;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.approve{background:#c6a75e;color:#111;}
.reject{background:#2a2a2a;color:#fff;}
.delete{background:#7a1f1f;color:#fff;}

.status{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
}

/* Responsive */
@media(max-width:768px){
  .container{
    margin-top:2rem;
  }
}
</style>
</head>
<body>

<header>
  <h1>Admin · Properties</h1>
  <button class="back-btn" onclick="location.href='admin.html'">
    ← Dashboard
  </button>
</header>

<div class="container">
  <h2>All Submitted Properties</h2>

  <div id="properties" class="cards"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const container = document.getElementById("properties");
  const properties = JSON.parse(localStorage.getItem("builderProperties") || "[]");

  if (!properties.length) {
    container.innerHTML = "<p style='color:#8b9dc3'>No properties found.</p>";
    return;
  }

  properties.forEach(p => {
    const name = p.propertyName || p.name || "Property";
    const type = p.propertyType || p.type || "N/A";
    const status = (p.status || "pending").toUpperCase();
    const role = (p.sourceRole || "builder").toUpperCase();
    const owner = p.builderEmail || p.brokerEmail || "N/A";
    const price = Number(p.price || 0);
    const key = p.id || `${p.createdAt || 0}_${name}_${owner}`;
    const keyEncoded = encodeURIComponent(key);
    container.innerHTML += `
      <div class="card">
        <h3>${name}</h3>
        <p>📍 ${p.location}</p>
        <p style="color:var(--gold);font-weight:700">
          ₹ ${price.toLocaleString()}
        </p>
        <p>${p.bhk} · ${p.area}</p>
        <p>Source: ${role}</p>
        <p>Owner: ${owner}</p>
        <p class="status">Status: ${status}</p>
        <span class="tag">${type}</span>
        <div class="actions">
          <button class="btn approve" onclick="updateStatus('${keyEncoded}', 'approved')">Approve</button>
          <button class="btn reject" onclick="updateStatus('${keyEncoded}', 'rejected')">Reject</button>
          <button class="btn delete" onclick="removeProperty('${keyEncoded}')">Remove</button>
        </div>
      </div>
    `;
  });

});

function getPropertyKey(p){
  return p.id || `${p.createdAt || 0}_${p.propertyName || p.name || ""}_${p.builderEmail || p.brokerEmail || ""}`;
}

function updateStatus(keyEncoded, status){
  const key = decodeURIComponent(keyEncoded);
  const all = JSON.parse(localStorage.getItem("builderProperties") || "[]");
  const next = all.map(p => getPropertyKey(p) === key ? { ...p, status } : p);
  localStorage.setItem("builderProperties", JSON.stringify(next));
  location.reload();
}

function removeProperty(keyEncoded){
  const key = decodeURIComponent(keyEncoded);
  const confirmed = confirm("Remove this property permanently?");
  if (!confirmed) return;
  const all = JSON.parse(localStorage.getItem("builderProperties") || "[]");
  const next = all.filter(p => getPropertyKey(p) !== key);
  localStorage.setItem("builderProperties", JSON.stringify(next));
  location.reload();
}
</script>

</body>
