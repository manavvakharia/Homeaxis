<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Settings | HomeAxis</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#2e2c27;
  --champagne:#f3efe6;
  --gold:#c6a75e;
  --gold-soft:#e5d2a4;
  --dark:#111111;
  --card:#ffffff;
  --text-main:#1c1c1c;
  --text-muted:#6b6b6b;
  --border-soft:rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  font-family:Montserrat,sans-serif;
  background:var(--bg);
  color:var(--text-main);
}

/* ===== SETTINGS CARD ===== */
.settings-card{
  width:100%;
  max-width:520px;
  background:var(--card);
  border-radius:18px;
  border:1px solid var(--border-soft);
  padding:2.4rem 2.4rem 2.6rem;
  box-shadow:0 30px 70px rgba(0,0,0,.12);
  transition:all .35s ease;
}

.settings-card:hover{
  transform:translateY(-4px);
  box-shadow:0 45px 90px rgba(0,0,0,.18);
}

/* ===== TOP BAR ===== */
.settings-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:2rem;
}

/* ===== PROFILE ===== */
.profile{
  display:flex;
  align-items:center;
  gap:1rem;
}

.profile img{
  width:64px;
  height:64px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--gold-soft);
  box-shadow:0 8px 20px rgba(198,167,94,.25);
}

.profile h3{
  margin:0;
  font-size:1rem;
  letter-spacing:.18em;
  text-transform:uppercase;
}

.profile span{
  font-size:.75rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--gold);
}

/* ===== DASHBOARD BUTTON ===== */
.dashboard-btn{
  padding:.55rem 1.4rem;
  border-radius:999px;
  border:1px solid rgba(198,167,94,.4);
  background:transparent;
  color:var(--gold);
  font-size:.7rem;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .3s ease;
}

.dashboard-btn:hover{
  background:linear-gradient(135deg,var(--gold),var(--gold-soft));
  color:#000;
  box-shadow:0 10px 28px rgba(198,167,94,.45);
  transform:translateY(-2px);
}

/* ===== FORM ===== */
.settings-form{
  display:grid;
  gap:1.5rem;
}

.form-group label{
  display:block;
  font-size:.7rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:.5rem;
}

.settings-form input[type="email"]{
  width:100%;
  padding:.9rem 1rem;
  border-radius:12px;
  border:1px solid var(--border-soft);
  background:#ffffff;
  color:var(--text-main);
  font-family:Montserrat,sans-serif;
  font-size:.85rem;
  transition:all .25s ease;
}

.settings-form input:focus{
  outline:none;
  border-color:var(--gold-soft);
  box-shadow:0 0 0 2px rgba(198,167,94,.15);
}

/* ===== CHECKBOX ===== */
.checkbox-group label{
  display:flex;
  align-items:center;
  gap:.6rem;
  font-size:.85rem;
  color:var(--text-muted);
  cursor:pointer;
}

.checkbox-group input{
  accent-color:var(--gold);
  width:16px;
  height:16px;
}

/* ===== SAVE BUTTON ===== */
.settings-form button{
  margin-top:.8rem;
  padding:.9rem;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,var(--gold),var(--gold-soft));
  color:#000;
  font-size:.75rem;
  font-weight:800;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .3s ease;
}

.settings-form button:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px rgba(198,167,94,.45);
}
</style>
</head>

<body>

<div class="settings-card">

  <!-- TOP BAR -->
  <div class="settings-top">
    <div class="profile">
      <img src="images/admin.png" alt="HomeAxis Admin Logo">
      <div>
        <h3>Admin Settings</h3>
        <span>HomeAxis Control Panel</span>
      </div>
    </div>

    <button class="dashboard-btn" onclick="location.href='admin.html'">
      Dashboard
    </button>
  </div>

  <!-- FORM -->
  <form class="settings-form">
    <div class="form-group">
      <label>Admin Email</label>
      <input type="email" value="admin@homeaxis.com">
    </div>

    <div class="form-group checkbox-group">
      <label>
        <input type="checkbox" checked>
        Email notifications enabled
      </label>
    </div>

    <button type="submit">Save Settings</button>
  </form>

</div>

</body>
</html>
