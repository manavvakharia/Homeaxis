<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer Login | HomeAxis</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<script>
if (localStorage.getItem("customerLoggedIn") === "true") {
  window.location.href = "customer-dashboard.html";
}
</script>

<style>:root{
  --bg:#f8f6f1;
  --champagne:#f3efe6;
  --gold:#c6a75e;
  --gold-soft:#e5d2a4;
  --dark:#111111;
  --card:#161616;
  --text-light:#ffffff;
  --text-muted:rgba(255,255,255,.6);
  --border-soft:rgba(198,167,94,.18);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  font-family:Montserrat,sans-serif;
  background:var(--bg);
  color:#1c1c1c;
}

/* ===== CARD ===== */
.card{
  width:min(460px,92%);
  background:var(--card);
  padding:2.6rem 2.4rem;
  border-radius:22px;
  border:1px solid var(--border-soft);
  box-shadow:0 40px 90px rgba(0,0,0,.25);
  color:var(--text-light);
  transition:.35s ease;
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--gold);
  box-shadow:0 60px 110px rgba(0,0,0,.35);
}

/* ===== LOGO ===== */
.logo{
  text-align:center;
  font-weight:900;
  letter-spacing:.28em;
  margin-bottom:1.8rem;
  color:var(--gold-soft);
}

.logo span{
  display:block;
  font-size:.65rem;
  color:var(--text-muted);
  letter-spacing:.22em;
  margin-top:.4rem;
}

/* ===== TITLE ===== */
h2{
  text-align:center;
  font-size:1.1rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  margin-bottom:1.6rem;
}

/* ===== FORM ===== */
form{
  display:grid;
  gap:1.2rem;
}

input,select{
  padding:.9rem 1rem;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:#111111;
  color:#ffffff;
  font-size:.9rem;
  transition:.3s ease;
}

input::placeholder{
  color:rgba(255,255,255,.35);
}

select{
  cursor:pointer;
}

input:focus,
select:focus{
  outline:none;
  border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(198,167,94,.15);
}

/* ===== PROFILE FIELDS ===== */
#profileFields{
  display:grid;
  gap:1rem;
}

/* ===== BUTTON ===== */
button{
  margin-top:.8rem;
  padding:.95rem;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,var(--gold),var(--gold-soft));
  color:#000;
  font-weight:800;
  letter-spacing:.18em;
  text-transform:uppercase;
  cursor:pointer;
  transition:.3s ease;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 35px rgba(198,167,94,.45);
}

/* ===== TOGGLE ===== */
.toggle{
  text-align:center;
  margin-top:1.4rem;
  font-size:.8rem;
  color:var(--gold-soft);
  cursor:pointer;
  transition:.3s ease;
}

.toggle:hover{
  color:var(--gold);
}

/* ===== ERROR ===== */
.error{
  display:none;
  background:rgba(255,80,80,.12);
  border:1px solid rgba(255,80,80,.35);
  color:#ffbcbc;
  padding:.7rem .9rem;
  border-radius:12px;
  font-size:.8rem;
  text-align:center;
}

.back-btn{
  position:fixed;
  top:18px;
  left:18px;
  padding:.55rem 1rem;
  border-radius:999px;
  border:1px solid rgba(198,167,94,.45);
  background:#111;
  color:var(--gold-soft);
  text-decoration:none;
  font-size:.72rem;
  letter-spacing:.08em;
  font-weight:700;
}

/* ===== DEMO LINK ===== */
a{
  color:var(--gold-soft);
  text-decoration:none;
  font-size:.7rem;
}

a:hover{
  color:var(--gold);
}</style>
</head>

<body>

<a class="back-btn" href="index.html">← Back</a>

<div class="card">
  <div class="logo">
    HOMEAXIS
    <span>Customer Portal</span>
  </div>

  <h2 id="formTitle">Customer Login</h2>

  <div class="error" id="errorBox"></div>

  <form id="authForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <div id="profileFields" style="display:none;">
      <input type="number" id="age" placeholder="Age" min="18" max="100">
      <select id="gender">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
      <select id="profession">
        <option value="">Select Profession</option>
        <option>IT Professional</option>
        <option>Doctor</option>
        <option>Engineer</option>
        <option>Business Owner</option>
        <option>Government Employee</option>
        <option>Teacher</option>
        <option>Other</option>
      </select>
      <select id="maritalStatus">
        <option value="">Select Marital Status</option>
        <option>Single</option>
        <option>Married</option>
        <option>Divorced</option>
        <option>Widowed</option>
      </select>
    </div>

    <button type="submit" id="submitBtn">Login</button>
  </form>

  <div class="toggle" id="toggleForm">
    New user? Create an account
  </div>

  <div style="text-align:center;margin-top:1.2rem;">
    <a href="seed-customers.html" style="font-size:.7rem;color:var(--muted);text-decoration:none;">Load 50 demo customers (login: any email · password: demo123)</a>
  </div>
</div>

<script>
let isSignup = false;

const form = document.getElementById("authForm");
const toggle = document.getElementById("toggleForm");
const title = document.getElementById("formTitle");
const button = document.getElementById("submitBtn");
const errorBox = document.getElementById("errorBox");

const profileFields = document.getElementById("profileFields");
toggle.onclick = () => {
  isSignup = !isSignup;
  title.innerText = isSignup ? "Customer Signup" : "Customer Login";
  button.innerText = isSignup ? "Sign Up" : "Login";
  toggle.innerText = isSignup
    ? "Already have an account? Login"
    : "New user? Create an account";
  profileFields.style.display = isSignup ? "grid" : "none";
  profileFields.style.gap = "1rem";
  if(isSignup){
    document.getElementById("age").required = true;
    document.getElementById("gender").required = true;
    document.getElementById("profession").required = true;
    document.getElementById("maritalStatus").required = true;
  } else {
    document.getElementById("age").required = false;
    document.getElementById("gender").required = false;
    document.getElementById("profession").required = false;
    document.getElementById("maritalStatus").required = false;
  }
};

form.addEventListener("submit", (e) => {
  e.preventDefault();
  errorBox.style.display = "none";

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();

  if (password.length < 4) {
    errorBox.innerText = "Password must be at least 4 characters";
    errorBox.style.display = "block";
    return;
  }

  // Always initialize users
  let users = JSON.parse(localStorage.getItem("customers")) || [];

  if (isSignup) {
    const exists = users.some(u => u.email === email);
    if (exists) {
      errorBox.innerText = "Account already exists";
      errorBox.style.display = "block";
      return;
    }

    const age = document.getElementById("age").value;
    const gender = document.getElementById("gender").value;
    const profession = document.getElementById("profession").value;
    const maritalStatus = document.getElementById("maritalStatus").value;

    if (!age || !gender || !profession || !maritalStatus) {
      errorBox.innerText = "Please fill all profile details";
      errorBox.style.display = "block";
      return;
    }

    users.push({
      email, password,
      age: parseInt(age, 10),
      gender, profession, maritalStatus,
      createdAt: new Date().toISOString()
    });
    localStorage.setItem("customers", JSON.stringify(users));
  } else {
    const user = users.find(u => u.email === email && u.password === password);
    if (!user) {
      errorBox.innerText = "Invalid email or password";
      errorBox.style.display = "block";
      return;
    }
  }

  // ✅ LOGIN SUCCESS
  localStorage.setItem("customerLoggedIn", "true");
  localStorage.setItem("customerEmail", email);

  window.location.href = "customer-dashboard.html";
});
</script>


</body>
</html>
